title: "CUT&Tag paired-end pipeline report"
subtitle: "QC, trimming, alignment, filtering, peak calling, annotation, FRiP, and signal enrichment"
report_comment: >
  Custom sections are generated by the pipeline from TSV files ending in _mqc.tsv.

custom_data:
  read_retention:
    section_name: "CUT&Tag read retention"
    description: "Paired-end fragments retained at each major processing stage."
    plot_type: "linegraph"
    pconfig:
      id: "cutntag_read_retention"
      title: "Read retention"
      ylab: "Fragments"
  peak_counts:
    section_name: "Peak counts"
    description: "MACS3 and consensus peak counts."
    plot_type: "bargraph"
    pconfig:
      id: "cutntag_peak_counts"
      title: "Peak counts"
      ylab: "Peaks"
  frip:
    section_name: "FRiP"
    description: "Fraction of fragments in sample, group, and consensus peaks."
    plot_type: "bargraph"
    pconfig:
      id: "cutntag_frip"
      title: "FRiP"
      ylab: "FRiP"
  tss_enrichment:
    section_name: "TSS enrichment"
    description: "Median BigWig signal enrichment around transcription start sites."
    plot_type: "bargraph"
    pconfig:
      id: "cutntag_tss_enrichment"
      title: "TSS enrichment"
      ylab: "Median enrichment"

sp:
  read_retention:
    fn: "read_retention_mqc.tsv"
  peak_counts:
    fn: "*peak_counts_mqc.tsv"
  frip:
    fn: "frip_mqc.tsv"
  tss_enrichment:
    fn: "tss_enrichment_mqc.tsv"
  annotation_categories:
    fn: "annotation_category_mqc.tsv"

